name: Release

on:
  push:
    tags: ["desktop-v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build and publish, for example desktop-v2.0.0"
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  release-build:
    name: Build release asset (${{ matrix.os-short }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-short: windows
            arch: amd64
          - os: macos-latest
            os-short: macos
            arch: amd64
          - os: ubuntu-latest
            os-short: linux
            arch: amd64

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^desktop-v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "RELEASE_TAG must look like desktop-v2.0.0, got: $RELEASE_TAG"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Validate package version
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION="${RELEASE_TAG#desktop-v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [[ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]]; then
            echo "::error::package.json version ($PACKAGE_VERSION) must match release tag without desktop-v ($RELEASE_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Build Electron app
        run: npm run build

      - name: Package with electron-builder
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          npx electron-builder --publish=never

          # Collect output artifacts into release-assets
          mkdir -p release-assets
          assets=()
          if [[ "${{ matrix.os-short }}" == "windows" ]]; then
            assets=(dist/*.exe dist/*.exe.blockmap dist/latest.yml)
          elif [[ "${{ matrix.os-short }}" == "macos" ]]; then
            assets=(dist/*.dmg dist/*.zip dist/*.zip.blockmap dist/latest-mac.yml)
          else
            assets=(dist/*.AppImage dist/*.AppImage.blockmap dist/latest-linux.yml)
          fi

          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::No release assets found in dist/"
            ls -la dist/ || true
            exit 1
          fi

          for asset in "${assets[@]}"; do
            cp "$asset" release-assets/
          done

          echo "Release asset: $(ls -lh release-assets/)"

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ env.RELEASE_TAG }}-${{ matrix.os-short }}-${{ matrix.arch }}
          path: release-assets/*
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-${{ env.RELEASE_TAG }}-*
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(release-assets/*)
          echo "Found ${#assets[@]} release asset(s):"
          for a in "${assets[@]}"; do
            echo "  - $a ($(du -h "$a" | cut -f1))"
          done

          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::No release assets found in release-assets/"
            ls -la release-assets/ || true
            exit 1
          fi

          echo "Target release tag: $RELEASE_TAG"
          echo "Target repo: $GH_REPO"

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release exists. Uploading assets..."
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber --repo "$GH_REPO"
            echo "Upload command completed."
          else
            echo "Release does not exist. Creating release with assets..."
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              --repo "$GH_REPO"
            echo "Release created with assets."
          fi

          echo "Verifying release assets:"
          gh release view "$RELEASE_TAG" --repo "$GH_REPO" --json assets --jq '.assets[] | "  \(.name) (\(.size) bytes)"' || echo "(could not verify)"

      - name: Update desktop-latest tag
        run: |
          set -euo pipefail
          git tag -f desktop-latest "$RELEASE_TAG^{}"
          git push origin -f desktop-latest
          echo "desktop-latest tag updated to $RELEASE_TAG"
