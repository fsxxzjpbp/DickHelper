name: Release

on:
  push:
    tags: ["v*.*.*"]
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build and publish, for example v2.0.0"
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  release-build:
    name: Build release asset (${{ matrix.os-short }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-short: windows
          - os: macos-latest
            os-short: macos
          - os: ubuntu-latest
            os-short: linux

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "RELEASE_TAG must look like v2.0.0, got: $RELEASE_TAG"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Build Electron app
        run: npm run build

      - name: Assemble portable package
        shell: bash
        run: |
          set -euo pipefail
          STAGING="dist/dickhelper"
          mkdir -p "$STAGING"

          # Copy built app
          cp -r out/ "$STAGING/"

          # Copy only the runtime dependency (sql.js WASM — all other deps are bundled by Vite)
          mkdir -p "$STAGING/node_modules"
          cp -r node_modules/sql.js/ "$STAGING/node_modules/"

          # Copy Electron runtime
          mkdir -p "$STAGING/electron"
          cp -r node_modules/electron/dist/* "$STAGING/electron/"

          # Copy package.json (Electron reads "main" from it)
          cp package.json "$STAGING/"

          # Create launcher script
          if [[ "${{ matrix.os-short }}" == "windows" ]]; then
            printf '@start "" ".\\electron\\electron.exe" .\r\n' > "$STAGING/start.bat"
          elif [[ "${{ matrix.os-short }}" == "macos" ]]; then
            printf '#!/bin/bash\n"./electron/Electron.app/Contents/MacOS/Electron" .\n' > "$STAGING/start.command"
            chmod +x "$STAGING/start.command"
          else
            printf '#!/bin/bash\n"./electron/electron" .\n' > "$STAGING/start.sh"
            chmod +x "$STAGING/start.sh"
          fi

          echo "Package assembled: $(du -sh "$STAGING" | cut -f1)"

      - name: Compress portable package
        shell: pwsh
        run: |
          $assetName = "dickhelper-${{ env.RELEASE_TAG }}-${{ matrix.os-short }}.zip"
          New-Item -ItemType Directory -Force release-assets
          Compress-Archive -Path dist/dickhelper/* -DestinationPath "release-assets/$assetName" -Force
          Write-Host "Archive: $assetName ($((Get-Item "release-assets/$assetName").Length / 1MB) MB)"

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ env.RELEASE_TAG }}-${{ matrix.os-short }}
          path: release-assets/*.zip
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-${{ env.RELEASE_TAG }}-*
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(release-assets/*.zip)
          echo "Found ${#assets[@]} release asset(s):"
          for a in "${assets[@]}"; do
            echo "  - $a ($(du -h "$a" | cut -f1))"
          done

          if [ ${#assets[@]} -eq 0 ]; then
            echo "::error::No release assets found in release-assets/"
            ls -la release-assets/ || true
            exit 1
          fi

          echo "Target release tag: $RELEASE_TAG"
          echo "Target repo: $GH_REPO"

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release exists. Uploading assets..."
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber --repo "$GH_REPO"
            echo "Upload command completed."
          else
            echo "Release does not exist. Creating release with assets..."
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              --repo "$GH_REPO"
            echo "Release created with assets."
          fi

          echo "Verifying release assets:"
          gh release view "$RELEASE_TAG" --repo "$GH_REPO" --json assets --jq '.assets[] | "  \(.name) (\(.size) bytes)"' || echo "(could not verify)"
