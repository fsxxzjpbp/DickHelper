name: Release

on:
  push:
    tags: ["v*.*.*"]
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build and publish, for example v2.0.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  release-build:
    name: Build release asset (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "RELEASE_TAG must look like v2.0.0, got: $RELEASE_TAG"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Build Electron app
        run: npm run build

      - name: Compress build output
        shell: pwsh
        run: |
          $assetName = "dickhelper-${{ env.RELEASE_TAG }}-${{ matrix.os }}.zip"
          New-Item -ItemType Directory -Force release-assets
          Compress-Archive -Path out/* -DestinationPath "release-assets/$assetName" -Force

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ env.RELEASE_TAG }}-${{ matrix.os }}
          path: release-assets/*.zip
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-${{ env.RELEASE_TAG }}-*
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(release-assets/*.zip)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" --title "$TAG_NAME" --generate-notes --verify-tag
          fi
