name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build and publish, for example v2.0.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  ci:
    name: CI (${{ matrix.os }})
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_type == 'branch')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Build Electron app
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dickhelper-${{ matrix.os }}
          path: out/
          retention-days: 7

  release-build:
    name: Release build (${{ matrix.os }})
    if: |
      (github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && github.event.deleted == false) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.tag, 'v'))
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Build Electron app
        run: npm run build

      - name: Compress build output
        shell: pwsh
        run: |
          $tagName = "${{ env.RELEASE_TAG }}"
          $osName = "${{ matrix.os }}"
          $assetName = "dickhelper-$tagName-$osName.zip"
          New-Item -ItemType Directory -Force release-assets
          Compress-Archive -Path out/* -DestinationPath "release-assets/$assetName" -Force

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ env.RELEASE_TAG }}-${{ matrix.os }}
          path: release-assets/*.zip
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    if: |
      (github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && github.event.deleted == false) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.tag, 'v'))
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-${{ env.RELEASE_TAG }}-*
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(release-assets/*.zip)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" --title "$TAG_NAME" --generate-notes --verify-tag
          fi
