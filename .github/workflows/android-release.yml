name: Android Release

on:
  push:
    tags: ["mobile-v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag, e.g. mobile-v0.0.1"
        required: true
        type: string

permissions:
  contents: read
  actions: read

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Validate release tag
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^mobile-v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "RELEASE_TAG must match mobile-vX.Y.Z, got: $RELEASE_TAG"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle build
        uses: actions/cache@v4
        with:
          path: |
            apps/mobile/android/.gradle
            apps/mobile/android/app/build
          key: gradle-build-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle.lockfile') }}
          restore-keys: |
            gradle-build-${{ runner.os }}-

      - name: Parse version from tag
        id: version
        run: |
          VERSION="${RELEASE_TAG#mobile-v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "App version: $VERSION (code: $VERSION_CODE)"

      - name: Write version to app.json
        working-directory: apps/mobile
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          VERSION_CODE='${{ steps.version.outputs.versionCode }}'
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            config.expo.version = '$VERSION';
            config.expo.android.versionCode = $VERSION_CODE;
            fs.writeFileSync('app.json', JSON.stringify(config, null, 2) + '\n');
          "
          echo "Updated app.json: version=$VERSION, versionCode=$VERSION_CODE"

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/mobile/release.keystore
          echo "Keystore decoded ($(wc -c < apps/mobile/release.keystore) bytes)"

      - name: Generate Android native project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android

      - name: Inject release signing config
        working-directory: apps/mobile/android/app
        run: |
          node -e "
          const fs = require('fs');
          let content = fs.readFileSync('build.gradle', 'utf8');

          // Insert release signingConfig before the closing '}' of signingConfigs block.
          // Uses brace counting instead of fragile regex.
          const releaseBlock = '\n' + [
            '        release {',
            '            storeFile rootProject.file(\"../release.keystore\")',
            '            storePassword System.getenv(\"KEYSTORE_PASSWORD\") ?: \"android\"',
            '            keyAlias System.getenv(\"KEY_ALIAS\") ?: \"androiddebugkey\"',
            '            keyPassword System.getenv(\"KEY_PASSWORD\") ?: \"android\"',
            '        }',
          ].join('\n') + '\n    ';

          const sigIdx = content.indexOf('signingConfigs {');
          let depth = 0;
          let insertAt = -1;
          for (let i = content.indexOf('{', sigIdx); i < content.length; i++) {
            if (content[i] === '{') depth++;
            if (content[i] === '}') {
              depth--;
              if (depth === 0) { insertAt = i; break; }
            }
          }
          if (insertAt === -1) throw new Error('Could not find signingConfigs closing brace');
          content = content.slice(0, insertAt) + releaseBlock + content.slice(insertAt);

          // Replace only the SECOND signingConfigs.debug -> signingConfigs.release
          let count = 0;
          content = content.replace(
            /signingConfig signingConfigs\.debug/g,
            (match) => {
              count++;
              return count === 2 ? 'signingConfig signingConfigs.release' : match;
            }
          );

          fs.writeFileSync('build.gradle', content, 'utf8');
          console.log('Injected release signing config');

          // Verification
          var lines = content.split('\n');
          lines.forEach(function(line, i) {
            if (/signingConfig|storeFile|storePassword|keyAlias|keyPassword/.test(line)) {
              console.log('  ' + (i + 1) + ': ' + line.trim());
            }
          });
          "

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a

      - name: Collect APK artifacts
        run: |
          mkdir -p release-assets/versioned release-assets/mobile-latest
          APK=$(find apps/mobile/android/app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found in release output"
            find apps/mobile/android/app/build/outputs -name '*.apk' 2>/dev/null || echo "(no apk found)"
            exit 1
          fi
          VERSION='${{ steps.version.outputs.version }}'
          VERSION_CODE='${{ steps.version.outputs.versionCode }}'
          PUBLISHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          VERSIONED_APK="release-assets/versioned/DickHelper-${VERSION}-android.apk"
          LATEST_APK="release-assets/mobile-latest/DickHelper-mobile-latest.apk"

          cp "$APK" "$VERSIONED_APK"
          cp "$APK" "$LATEST_APK"

          APK_SHA256=$(sha256sum "$LATEST_APK" | awk '{print $1}')
          printf '%s  %s\n' "$APK_SHA256" "DickHelper-mobile-latest.apk" > release-assets/mobile-latest/DickHelper-mobile-latest.apk.sha256

          VERSION="$VERSION" \
          VERSION_CODE="$VERSION_CODE" \
          PUBLISHED_AT="$PUBLISHED_AT" \
          APK_SHA256="$APK_SHA256" \
          GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
          node -e "const fs=require('fs'); const path=require('path'); const manifest={version:process.env.VERSION, versionCode:Number(process.env.VERSION_CODE), publishedAt:process.env.PUBLISHED_AT, notes:'Android APK for DickHelper Mobile v' + process.env.VERSION + '.', apkUrl:'https://github.com/' + process.env.GITHUB_REPOSITORY + '/releases/download/mobile-latest/DickHelper-mobile-latest.apk', apkSha256:process.env.APK_SHA256, force:false}; fs.writeFileSync(path.join('release-assets','mobile-latest','mobile-update.json'), JSON.stringify(manifest, null, 2) + '\n', 'utf8');"

          echo "Versioned assets:"
          ls -lh release-assets/versioned/
          echo "mobile-latest assets:"
          ls -lh release-assets/mobile-latest/

      - name: Upload versioned APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-${{ env.RELEASE_TAG }}
          path: release-assets/versioned/*
          if-no-files-found: error
          retention-days: 7

      - name: Upload mobile-latest artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-mobile-latest-${{ env.RELEASE_TAG }}
          path: release-assets/mobile-latest/*
          if-no-files-found: error
          retention-days: 7

  publish-release:
    name: Publish GitHub Release
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download versioned APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release-${{ env.RELEASE_TAG }}
          path: release-assets/versioned

      - name: Download mobile-latest artifact
        uses: actions/download-artifact@v4
        with:
          name: android-mobile-latest-${{ env.RELEASE_TAG }}
          path: release-assets/mobile-latest

      - name: Create GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          versioned_assets=(release-assets/versioned/*)
          latest_assets=(release-assets/mobile-latest/*)

          VERSION="${RELEASE_TAG#mobile-v}"
          if [ ${#versioned_assets[@]} -eq 0 ]; then
            echo "::error::No versioned release assets found in release-assets/versioned/"
            ls -la release-assets/versioned/ || true
            exit 1
          fi

          if [ ${#latest_assets[@]} -eq 0 ]; then
            echo "::error::No mobile-latest assets found in release-assets/mobile-latest/"
            ls -la release-assets/mobile-latest/ || true
            exit 1
          fi

          echo "Versioned assets:"
          for a in "${versioned_assets[@]}"; do
            echo "  - $a ($(du -h "$a" | cut -f1))"
          done

          echo "mobile-latest assets:"
          for a in "${latest_assets[@]}"; do
            echo "  - $a ($(du -h "$a" | cut -f1))"
          done

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Versioned release exists. Uploading assets..."
            gh release upload "$RELEASE_TAG" "${versioned_assets[@]}" --clobber --repo "$GH_REPO"
            gh release edit "$RELEASE_TAG" \
              --latest=false \
              --repo "$GH_REPO"
          else
            echo "Creating versioned release..."
            gh release create "$RELEASE_TAG" "${versioned_assets[@]}" \
              --title "DickHelper Mobile $VERSION" \
              --notes "Android APK for DickHelper Mobile v$VERSION." \
              --latest=false \
              --repo "$GH_REPO"
          fi

          if gh release view "mobile-latest" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "mobile-latest release exists. Uploading assets..."
            gh release upload "mobile-latest" "${latest_assets[@]}" --clobber --repo "$GH_REPO"
            gh release edit "mobile-latest" \
              --title "DickHelper Mobile latest" \
              --notes "Stable Android update manifest and APK assets for DickHelper Mobile v$VERSION." \
              --latest=false \
              --repo "$GH_REPO"
          else
            echo "Creating mobile-latest release..."
            gh release create "mobile-latest" "${latest_assets[@]}" \
              --title "DickHelper Mobile latest" \
              --notes "Stable Android update manifest and APK assets for DickHelper Mobile v$VERSION." \
              --latest=false \
              --repo "$GH_REPO"
          fi

          git tag -f mobile-latest "$RELEASE_TAG^{}"
          git push origin -f mobile-latest
          echo "mobile-latest tag updated to $RELEASE_TAG"
